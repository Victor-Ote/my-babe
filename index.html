<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você Fer ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    overflow:hidden;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
    padding:20px;
}

.container{
    text-align:center;
    z-index:2;
    width:100%;
    max-width:600px;
}

/* .foto{
    width:min(60vw, 250px);
    height:min(60vw, 250px);
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 0 30px rgba(255,255,255,.4);
} */

h1{
    margin-top:20px;
    font-size:clamp(1.8rem, 5vw, 3rem);
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:clamp(14px, 2vw, 18px);
}

.memoria{
    margin-top:20px;
    width:100%;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
    padding:10px;
    font-size:clamp(16px, 2.5vw, 22px);
    line-height:1.5;
}

.amo{
    position:absolute;
    color:rgba(255,255,255,.08);
    font-size:clamp(12px, 2vw, 24px);
    animation:flutuar 20s linear infinite;
    white-space:nowrap;
}

@keyframes flutuar{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-110vh);
    }
}

/* Celulares */

@media (max-width: 768px){

    .foto{
        width:200px;
        height:200px;
    }

    button{
        width:100%;
        max-width:300px;
    }

    .memoria{
        padding:15px;
    }

}

/* Celulares pequenos */

@media (max-width: 480px){

    .foto{
        width:150px;
        height:150px;
    }

    h1{
        margin-top:15px;
    }

    button{
        padding:14px 20px;
    }

}

.foto-container{
    width:min(60vw, 250px);
    height:min(60vw, 250px);

    margin:0 auto;

    border:5px solid white;
    border-radius:50%;

    overflow:hidden;

    box-shadow:0 0 30px rgba(255,255,255,.4);

    animation:pulse 3s infinite;
}

.foto{
    width:100%;
    height:100%;
    object-fit:cover;

    transition:opacity 0.8s ease;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;

    transition:all 0.15s ease;
}

button:hover{
    transform:scale(1.03);
}

button:active{
    transform:scale(0.95) translateY(2px);
}
</style>
</head>
<body>

<div id="fundo"></div>

<div class="container">

    <div class="foto-container">
    <img src="media/image1.jpeg" id="foto" class="foto">
</div>

    <h1>Eu Te Amo ❤️</h1>

    <button onclick="mostrarMemoria()">
        Descobrir o que eu mais amo...
    </button>

    <div class="memoria" id="memoria"></div>

</div>

<script>

    const imagens = [
    "media/image1.jpeg",
    "media/image2.jpeg",
    "media/image3.jpeg",
    "media/image4.jpeg",
    "media/image5.jpeg",
    "media/image6.jpeg",
    "media/image7.jpeg",
    "media/image8.jpeg",
    "media/image9.jpeg",
    "media/image10.jpeg",
    "media/image11.jpeg",
    "media/image12.jpeg",
    "media/image13.jpeg",
    "media/image14.jpeg",
    "media/image15.jpeg",
    "media/image16.jpeg",
    "media/image17.jpeg",
    "media/image18.jpeg",
    "media/image19.jpeg",
    "media/image20.jpeg",
    "media/image21.jpeg",
];

const foto = document.getElementById("foto");

setInterval(() => {

    foto.style.opacity = "0";

    setTimeout(() => {

        const aleatoria =
            imagens[Math.floor(Math.random() * imagens.length)];

        foto.src = aleatoria;
        foto.style.opacity = "1";

    }, 800);

}, 4000);

const frases = [
    "Eu te amo",          // Português
    "I love you",         // Inglês
    "Je t'aime",          // Francês
    "Ti amo",             // Italiano
    "Ich liebe dich",     // Alemão
    "Te quiero",          // Espanhol
    "Ik hou van jou",     // Holandês
    "Eu te iubesc",       // Romeno
    "Szeretlek",          // Húngaro
    "Kocham cię",         // Polonês
    "Miluji tě",          // Tcheco
    "Ľúbim ťa",           // Eslovaco
    "Volim te",           // Croata
    "Ljubim te",          // Esloveno
    "Jag älskar dig",     // Sueco
    "Jeg elsker deg",     // Norueguês
    "Jeg elsker dig",     // Dinamarquês
    "Minä rakastan sinua",// Finlandês
    "Ég elska þig",       // Islandês
    "S'agapo",            // Grego transliterado
    "Seni seviyorum",     // Turco
    "Ya tebya lyublyu",   // Russo transliterado
    "Te dua",             // Albanês
    "Anh yêu em",         // Vietnamita
    "Mahal kita",         // Filipino
    "Aku cinta padamu",   // Indonésio
    "Saya cinta kamu",    // Indonésio
    "Saya sayang awak",   // Malaio
    "Nakupenda",          // Suaíli
    "Ek het jou lief",    // Africâner
    "Mi amas vin",        // Esperanto
    "Aloha wau ia oe",    // Havaiano
    "Te aroha ahau ki a koe", // Maori
    "Tá grá agam duit",   // Irlandês
    "Rwy'n dy garu di",   // Galês
    "Mon renmen ou"       // Crioulo haitiano
];
for(let i=0;i<80;i++){

    const span = document.createElement("span");

    span.classList.add("amo");
    span.innerText = frases[Math.floor(Math.random()*frases.length)];

    span.style.left = Math.random()*100+"%";
    span.style.animationDuration =
        (10 + Math.random()*20)+"s";

    document.getElementById("fundo").appendChild(span);
}

const memorias = [  "Do seu abraço ❤️",
    "Do seu cheiro ❤️",
    "Da sua risada ❤️",
    "Do seu toque ❤️",
    "Dos seus olhos ❤️",
    "Da sua voz ❤️",
    "Do seu beijo ❤️",
    "Das nossas conversas ❤️",
    "Do nosso carinho ❤️",
    "Do seu cafuné ❤️",

    "Das nossas fotos juntos ❤️",
    "Da sua companhia ❤️",
    "Do seu sorriso ❤️",
    "Do jeito que você fala meu nome ❤️",
    "Dos nossos passeios ❤️",
    "Da sua presença ❤️",
    "Do seu carinho ❤️",
    "Das nossas brincadeiras ❤️",
    "Da forma que você me olha ❤️",
    "De simplesmente estar perto de você ❤️",

    "Das suas bochechas ❤️",
    "Do nosso gosto musical ❤️",
    "De acordar ao seu lado❤️",
    "De ouvir você contar sobre o seu dia ❤️",
    "De andar de mãos dadas com você ❤️",
    "Do jeito que você esfrega como um gato ❤️",
    "Da sua forma de dormir ❤️",
    "Dos nossos planos juntos ❤️",

    "De te fazer rir ❤️",
    "Do seu rostinho quando está sonolenta ❤️",
    "Das nossas piadas que só nós entendemos ❤️",
    "De te abraçar sem motivo ❤️",
    "Do seu olhar quando está feliz ❤️",
    "De compartilhar momentos simples com você ❤️",
    "Do jeito que você me acalma ❤️",
    "Da sensação de estar em casa quando estou com você ❤️",
    "De poder chamar você de minha ❤️",
    "Da sua existência na minha vida ❤️"

];

function mostrarMemoria(){

    const sorteio =
        memorias[Math.floor(Math.random()*memorias.length)];

    document.getElementById("memoria").innerHTML = sorteio;
}

</script>

</body>
</html>
